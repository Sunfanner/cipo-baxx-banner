<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резервы · Cipo & Baxx · Турция</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0c0c;
    --bg2:#141414;
    --line:#262626;
    --text:#f4f4f2;
    --muted:#8a8a87;
    --accent:#e8333a;
    --accent-dim:rgba(232,51,58,.14);
    --good:#3ecf6a;
    --bad:#e8333a;
    --mono:'JetBrains Mono', monospace;
    --sans:'Manrope', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased;}
  body{padding-bottom:60px;}

  .wrap{max-width:880px; margin:0 auto; padding:0 18px;}

  header{border-bottom:1px solid var(--line); padding:22px 0 18px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:var(--accent); text-transform:uppercase; display:flex; align-items:center; gap:8px;}
  .eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block;}
  .eyebrow .dot.live{animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  h1{font-size:26px; font-weight:800; letter-spacing:-0.01em; margin:6px 0 0; line-height:1.15;}
  .sub-row{display:flex; justify-content:space-between; align-items:center; margin-top:6px; gap:10px;}
  .sub{color:var(--muted); font-size:13px; font-family:var(--mono);}
  .refresh-btn{background:none; border:1px solid var(--line); color:var(--muted); font-family:var(--mono); font-size:11px; padding:6px 10px; border-radius:7px; cursor:pointer; flex-shrink:0; white-space:nowrap;}
  .refresh-btn:hover{border-color:var(--accent); color:var(--text);}
  .refresh-btn:disabled{opacity:.5; cursor:default;}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); margin-top:18px; border:1px solid var(--line);}
  .stat{background:var(--bg); padding:14px 12px;}
  .stat .num{font-family:var(--mono); font-size:20px; font-weight:700; color:var(--text);}
  .stat .lbl{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:3px;}

  .search-block{padding:22px 0 4px; position:relative;}
  .search-box{position:relative;}
  #searchInput{
    width:100%; background:var(--bg2); border:1px solid var(--line); color:var(--text);
    font-family:var(--mono); font-size:16px; padding:14px 44px 14px 16px; border-radius:10px;
    outline:none; transition:border-color .15s;
  }
  #searchInput:focus{border-color:var(--accent);}
  #searchInput::placeholder{color:var(--muted);}
  #searchInput:disabled{opacity:.5;}
  .search-icon{position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none;}
  .clear-btn{position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:6px; display:none;}

  .suggest{position:absolute; left:0; right:0; top:calc(100% + 6px); background:var(--bg2); border:1px solid var(--line); border-radius:10px; overflow:hidden; z-index:20; max-height:260px; overflow-y:auto; display:none;}
  .suggest-item{padding:11px 16px; font-family:var(--mono); font-size:13.5px; cursor:pointer; display:flex; justify-content:space-between; gap:10px; border-bottom:1px solid var(--line);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover, .suggest-item.active{background:var(--accent-dim);}
  .suggest-item .si-code{color:var(--text); font-weight:700;}
  .suggest-item .si-meta{color:var(--muted); font-size:11.5px;}

  #result{margin-top:22px;}
  .empty-hint{color:var(--muted); font-size:13px; padding:30px 0; text-align:center; font-family:var(--mono); border:1px dashed var(--line); border-radius:10px;}
  .status-block{color:var(--muted); font-size:13px; padding:40px 0; text-align:center; font-family:var(--mono);}
  .status-block.error{color:var(--accent); border:1px dashed var(--accent); border-radius:10px; padding:20px;}

  .article-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .article-code{font-size:22px; font-weight:800; letter-spacing:-0.01em;}
  .article-type{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:2px;}
  .article-total{text-align:right;}
  .article-total .num{font-family:var(--mono); font-size:24px; font-weight:700; color:var(--accent);}
  .article-total .lbl{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em;}

  .color-group{margin-top:18px; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .color-bar{display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--bg2); border-bottom:1px solid var(--line);}
  .color-name{font-weight:700; font-size:13.5px; text-transform:uppercase; letter-spacing:.04em;}
  .color-total{font-family:var(--mono); font-size:13px; color:var(--accent); font-weight:700;}

  table.sizes{width:100%; border-collapse:collapse;}
  table.sizes td, table.sizes th{padding:9px 14px; font-size:13px; text-align:left;}
  table.sizes th{color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:500; border-bottom:1px solid var(--line);}
  table.sizes td{font-family:var(--mono); border-bottom:1px solid var(--line);}
  table.sizes tr:last-child td{border-bottom:none;}
  table.sizes td.size-col{font-weight:700; color:var(--text);}
  table.sizes td.reserve-col{text-align:right; font-weight:700;}
  .mini-bar{height:4px; background:var(--line); border-radius:2px; width:54px; overflow:hidden; flex-shrink:0;}
  .mini-bar i{display:block; height:100%; background:var(--accent);}

  .section-title{font-family:var(--mono); font-size:11px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; margin:28px 0 10px; display:flex; align-items:center; justify-content:space-between;}
  .top-list{border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .top-row{display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); cursor:pointer; transition:background .12s;}
  .top-row:last-child{border-bottom:none;}
  .top-row:hover{background:var(--bg2);}
  .top-rank{font-family:var(--mono); font-size:11px; color:var(--muted); width:18px;}
  .top-code{font-weight:700; font-size:13.5px; width:78px; flex-shrink:0;}
  .top-bar-wrap{flex:1; height:6px; background:var(--bg2); border-radius:3px; overflow:hidden;}
  .top-bar{height:100%; background:linear-gradient(90deg, var(--accent), #ff6a5e);}
  .top-num{font-family:var(--mono); font-size:13px; font-weight:700; width:44px; text-align:right; flex-shrink:0;}

  .history-note{margin-top:28px; border:1px dashed var(--line); border-radius:10px; padding:16px; font-size:12.5px; color:var(--muted); line-height:1.5;}
  .history-note b{color:var(--text);}

  /* dynamics chart */
  .trend-wrap{border:1px solid var(--line); border-radius:10px; padding:16px 14px 10px; overflow-x:auto;}
  .trend-chart{display:flex; align-items:flex-end; gap:10px; height:120px; min-width:max-content; padding-top:6px;}
  .trend-col{display:flex; flex-direction:column; align-items:center; gap:6px; width:46px; flex-shrink:0;}
  .trend-bar-wrap{height:90px; display:flex; align-items:flex-end; width:100%;}
  .trend-bar{width:100%; background:linear-gradient(180deg, #ff6a5e, var(--accent)); border-radius:4px 4px 0 0; min-height:3px;}
  .trend-val{font-family:var(--mono); font-size:10.5px; color:var(--text); font-weight:700;}
  .trend-lbl{font-family:var(--mono); font-size:9.5px; color:var(--muted); white-space:nowrap;}

  .art-history{margin-top:18px; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .art-history .color-bar .color-name{text-transform:none;}
  table.history-table{width:100%; border-collapse:collapse;}
  table.history-table td, table.history-table th{padding:9px 14px; font-size:12.5px; text-align:left; font-family:var(--mono);}
  table.history-table th{color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.06em; font-weight:500; border-bottom:1px solid var(--line);}
  table.history-table td{border-bottom:1px solid var(--line);}
  table.history-table tr:last-child td{border-bottom:none;}
  table.history-table td.delta-pos{color:var(--good);}
  table.history-table td.delta-neg{color:var(--bad);}
  table.history-table td.num{text-align:right; font-weight:700;}

  footer{margin-top:36px; padding-top:14px; border-top:1px solid var(--line); font-family:var(--mono); font-size:11px; color:var(--muted); display:flex; justify-content:space-between;}

  @media (max-width:480px){
    .wrap{padding:0 14px;}
    header{padding:16px 0 14px;}
    h1{font-size:20px;}
    .sub-row{flex-wrap:wrap; row-gap:8px;}
    .sub{font-size:11.5px;}
    .refresh-btn{padding:7px 10px; font-size:10.5px;}

    .stats{grid-template-columns:repeat(3,1fr); margin-top:14px;}
    .stat{padding:10px 8px;}
    .stat .num{font-size:16px;}
    .stat .lbl{font-size:9px; line-height:1.3;}

    .search-block{padding:16px 0 4px;}
    #searchInput{font-size:15px; padding:13px 40px 13px 14px;}

    .section-title{margin:22px 0 8px; font-size:10px;}

    .article-head{flex-wrap:wrap; row-gap:6px;}
    .article-code{font-size:19px;}
    .article-total .num{font-size:20px;}

    .color-bar{padding:9px 12px;}
    table.sizes td, table.sizes th{padding:8px 10px; font-size:12.5px;}
    .mini-bar{width:36px;}

    .top-row{padding:10px 12px; gap:8px;}
    .top-rank{width:14px; font-size:10px;}
    .top-code{width:58px; font-size:11.5px;}
    .top-num{width:36px; font-size:12px;}

    .trend-wrap{padding:14px 10px 8px;}
    .trend-col{width:38px; gap:4px;}
    .trend-chart{gap:6px; height:108px;}
    .trend-bar-wrap{height:78px;}
    .trend-val{font-size:9.5px;}
    .trend-lbl{font-size:8.5px;}

    table.history-table td, table.history-table th{padding:8px 10px; font-size:11.5px;}

    footer{flex-direction:column; gap:4px; align-items:flex-start;}
  }

  @media (max-width:360px){
    .stat .lbl{font-size:8.2px;}
    .top-code{width:50px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow"><span class="dot live" id="liveDot"></span>CIPO &amp; BAXX · RESERVE STOCK</div>
    <h1>Резервы по поставщику (Турция)</h1>
    <div class="sub-row">
      <div class="sub" id="snapshotDate">загрузка…</div>
      <button class="refresh-btn" id="refreshBtn">↻ обновить</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="statTotal">—</div><div class="lbl">шт в резерве</div></div>
      <div class="stat"><div class="num" id="statArticles">—</div><div class="lbl">артикулов</div></div>
      <div class="stat"><div class="num" id="statSnapshots">—</div><div class="lbl">снимков истории</div></div>
    </div>
  </header>

  <div id="trendSection"></div>

  <div class="search-block">
    <div class="search-box">
      <input id="searchInput" type="text" autocomplete="off" inputmode="search" placeholder="Артикул, например CD844" disabled>
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <button class="clear-btn" id="clearBtn">×</button>
      <div class="suggest" id="suggest"></div>
    </div>
  </div>

  <div id="result"><div class="status-block">Подключаюсь к Google Диску…</div></div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxRqyG4eswj1mhyD1IxuC5OneizVDMQZ2bSeu182BQBfG8CewZvg01_8i3f6hhw4Jm-/exec';

let SNAPSHOTS = [];
let DATA = {};
let codes = [];

const input = document.getElementById('searchInput');
const suggest = document.getElementById('suggest');
const resultEl = document.getElementById('result');
const clearBtn = document.getElementById('clearBtn');
const refreshBtn = document.getElementById('refreshBtn');
const liveDot = document.getElementById('liveDot');
let activeIdx = -1;

function escapeHtml(s){return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function loadDataJSONP(){
  return new Promise((resolve, reject) => {
    const cbName = 'rezervCb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    let settled = false;
    const cleanup = () => {
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    };
    window[cbName] = (data) => {
      if(settled) return;
      settled = true;
      cleanup();
      resolve(data);
    };
    const script = document.createElement('script');
    const sep = API_URL.includes('?') ? '&' : '?';
    script.src = API_URL + sep + 'callback=' + cbName + '&_=' + Date.now();
    script.onerror = () => {
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error('Не удалось загрузить данные с Apps Script (проверь, что развёртывание активно)'));
    };
    document.body.appendChild(script);
    setTimeout(() => {
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error('Таймаут запроса к Apps Script (30 сек)'));
    }, 30000);
  });
}

async function loadData(){
  refreshBtn.disabled = true;
  liveDot.style.display = 'inline-block';
  input.disabled = true;
  resultEl.innerHTML = '<div class="status-block">Загружаю данные из папки «Резервы»…</div>';
  try {
    const json = await loadDataJSONP();
    if(json.error) throw new Error(json.error);
    if(!json.snapshots || !json.snapshots.length) throw new Error('В папке «Резервы» пока нет файлов .xls');

    SNAPSHOTS = json.snapshots;
    const latest = SNAPSHOTS[SNAPSHOTS.length - 1];
    DATA = latest.data;
    codes = Object.keys(DATA).sort();

    let totalReserve = 0;
    codes.forEach(c => totalReserve += DATA[c].total);

    document.getElementById('snapshotDate').textContent = 'срез на ' + latest.date;
    document.getElementById('statTotal').textContent = totalReserve.toLocaleString('ru-RU');
    document.getElementById('statArticles').textContent = codes.length;
    document.getElementById('statSnapshots').textContent = SNAPSHOTS.length;

    input.disabled = false;
    input.value = '';
    clearBtn.style.display = 'none';
    renderTrendSection();
    renderOverview();
  } catch(err) {
    resultEl.innerHTML = `<div class="status-block error">Не удалось загрузить данные: ${escapeHtml(err.message)}<br><br>Проверь, что Apps Script развёрнут с доступом «Все», и попробуй обновить.</div>`;
  } finally {
    refreshBtn.disabled = false;
    liveDot.style.display = 'none';
  }
}

function trendChartHtml(series){
  // series: [{label, value}]
  const max = Math.max(...series.map(s => s.value), 1);
  let html = '<div class="trend-wrap"><div class="trend-chart">';
  series.forEach(s => {
    const h = Math.max(3, Math.round(s.value / max * 90));
    html += `<div class="trend-col">
      <div class="trend-val">${s.value.toLocaleString('ru-RU')}</div>
      <div class="trend-bar-wrap"><div class="trend-bar" style="height:${h}px"></div></div>
      <div class="trend-lbl">${escapeHtml(s.label)}</div>
    </div>`;
  });
  html += '</div></div>';
  return html;
}

function renderTrendSection(){
  const trendEl = document.getElementById('trendSection');
  if(SNAPSHOTS.length >= 2){
    const series = SNAPSHOTS.map(s => ({
      label: s.date.slice(0,5),
      value: Object.values(s.data).reduce((sum, a) => sum + a.total, 0)
    }));
    trendEl.innerHTML = '<div class="section-title">Динамика общего резерва по неделям</div>' + trendChartHtml(series);
  } else {
    trendEl.innerHTML = `<div class="history-note">📈 <b>Динамика по периодам</b> появится здесь, когда накопится 2+ еженедельных файлов в папке «Резервы» на Диске. Сейчас доступен только один срез (${SNAPSHOTS[0].date}).</div>`;
  }
}

function renderOverview(){
  const sorted = codes.slice().sort((a,b)=>DATA[b].total - DATA[a].total);
  const max = sorted.length ? DATA[sorted[0]].total : 1;
  const top = sorted.slice(0, 15);
  let html = '<div class="section-title">Топ артикулов по резерву</div><div class="top-list">';
  top.forEach((code, i) => {
    const w = Math.max(4, Math.round(DATA[code].total / max * 100));
    html += `<div class="top-row" data-code="${code}">
      <div class="top-rank">${i+1}</div>
      <div class="top-code">${escapeHtml(code)}</div>
      <div class="top-bar-wrap"><div class="top-bar" style="width:${w}%"></div></div>
      <div class="top-num">${DATA[code].total}</div>
    </div>`;
  });
  html += '</div>';

  resultEl.innerHTML = html;
  resultEl.querySelectorAll('.top-row').forEach(row => {
    row.addEventListener('click', () => {
      input.value = row.dataset.code;
      renderArticle(row.dataset.code);
      hideSuggest();
    });
  });
}

function renderArticleHistory(code){
  if(SNAPSHOTS.length < 2) return '';
  let rows = '';
  let prevTotal = null;
  SNAPSHOTS.forEach(snap => {
    const total = snap.data[code] ? snap.data[code].total : 0;
    let deltaHtml = '<span style="color:var(--muted)">—</span>';
    if(prevTotal !== null){
      const delta = total - prevTotal;
      const cls = delta > 0 ? 'delta-pos' : (delta < 0 ? 'delta-neg' : '');
      const sign = delta > 0 ? '+' : '';
      deltaHtml = `<span class="${cls}">${sign}${delta}</span>`;
    }
    rows += `<tr><td>${escapeHtml(snap.date)}</td><td class="num">${total}</td><td class="num">${deltaHtml}</td></tr>`;
    prevTotal = total;
  });
  return `<div class="art-history">
    <div class="color-bar"><div class="color-name">История резерва по неделям</div></div>
    <table class="history-table">
      <thead><tr><th>Снимок</th><th style="text-align:right">Всего шт</th><th style="text-align:right">Δ к прошлому</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderArticle(codeRaw){
  const code = codeRaw.trim().toUpperCase();
  const art = DATA[code];
  if(!art){
    resultEl.innerHTML = `<div class="empty-hint">Артикул «${escapeHtml(codeRaw)}» не найден в текущем срезе резервов.</div>`;
    return;
  }
  const maxSize = Math.max(...Object.values(art.colors).flatMap(c => c.sizes.map(s => s.reserve)), 1);
  let html = `<div class="article-head">
    <div>
      <div class="article-code">${escapeHtml(code)}</div>
      <div class="article-type">${escapeHtml(art.name)}</div>
    </div>
    <div class="article-total"><div class="num">${art.total}</div><div class="lbl">шт всего</div></div>
  </div>`;

  Object.keys(art.colors).forEach(colorName => {
    const col = art.colors[colorName];
    html += `<div class="color-group">
      <div class="color-bar"><div class="color-name">${escapeHtml(colorName)}</div><div class="color-total">${col.total} шт</div></div>
      <table class="sizes">
        <thead><tr><th>Размер</th><th></th><th style="text-align:right">Резерв</th></tr></thead>
        <tbody>`;
    col.sizes.forEach(s => {
      const w = Math.max(6, Math.round(s.reserve / maxSize * 100));
      html += `<tr>
        <td class="size-col">${escapeHtml(s.size)}</td>
        <td><div class="mini-bar"><i style="width:${w}%"></i></div></td>
        <td class="reserve-col">${s.reserve}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  html += renderArticleHistory(code);

  resultEl.innerHTML = html;
}

function hideSuggest(){ suggest.style.display = 'none'; suggest.innerHTML=''; activeIdx=-1; }

function showSuggest(query){
  const q = query.trim().toUpperCase();
  if(!q){ hideSuggest(); return; }
  const matches = codes.filter(c => c.includes(q)).slice(0, 8);
  if(!matches.length){ hideSuggest(); return; }
  suggest.innerHTML = matches.map(c =>
    `<div class="suggest-item" data-code="${c}"><span class="si-code">${escapeHtml(c)}</span><span class="si-meta">${escapeHtml(DATA[c].name)} · ${DATA[c].total} шт</span></div>`
  ).join('');
  suggest.style.display = 'block';
  activeIdx = -1;
  suggest.querySelectorAll('.suggest-item').forEach(el => {
    el.addEventListener('click', () => {
      input.value = el.dataset.code;
      renderArticle(el.dataset.code);
      hideSuggest();
    });
  });
}

input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'block' : 'none';
  if(!input.value.trim()){ renderOverview(); hideSuggest(); return; }
  showSuggest(input.value);
});

input.addEventListener('keydown', (e) => {
  const items = suggest.querySelectorAll('.suggest-item');
  if(e.key === 'ArrowDown'){ e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); }
  else if(e.key === 'Enter'){
    e.preventDefault();
    if(activeIdx >= 0 && items[activeIdx]){ input.value = items[activeIdx].dataset.code; }
    renderArticle(input.value);
    hideSuggest();
    return;
  } else { return; }
  items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
  if(items[activeIdx]) items[activeIdx].scrollIntoView({block:'nearest'});
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.style.display = 'none';
  hideSuggest();
  renderOverview();
  input.focus();
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-box')) hideSuggest();
});

refreshBtn.addEventListener('click', loadData);

liveDot.style.display = 'none';
loadData();
</script>
</body>
</html>
