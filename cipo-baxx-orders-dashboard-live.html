<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipo & Baxx — Заказы на отшив</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0c0c; --panel:#141414; --panel2:#1b1b1b; --line:#2a2a2a;
    --red:#e8333a; --white:#fff; --muted:#8a8a8a; --muted2:#bcbcbc;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--white);font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;padding:32px 20px 80px;min-height:100vh}
  .wrap{max-width:920px;margin:0 auto}
  .top{display:flex;align-items:baseline;gap:14px;border-bottom:2px solid var(--red);
    padding-bottom:16px;margin-bottom:8px;flex-wrap:wrap;justify-content:space-between}
  .top-l{display:flex;align-items:baseline;gap:14px}
  .logo{font-weight:800;font-style:italic;font-size:26px;letter-spacing:-.5px}
  .logo .amp{color:var(--red)}
  .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:2px}
  .live{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;
    font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .live .dot{width:6px;height:6px;border-radius:50%;background:#3fb950;
    box-shadow:0 0 0 0 rgba(63,185,80,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 6px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}
  .live.err .dot{background:var(--red);animation:none}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:8px}
  .refresh{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:7px;padding:6px 12px;
    cursor:pointer;letter-spacing:.5px}
  .refresh:hover{border-color:var(--red);color:var(--white)}
  .refresh:disabled{opacity:.4;cursor:default}

  .searchbox{position:relative;margin-bottom:8px}
  input[type=text]{width:100%;background:var(--panel);border:1px solid var(--line);
    color:var(--white);font-family:'JetBrains Mono',monospace;font-size:16px;
    padding:16px 18px;border-radius:10px;outline:none;letter-spacing:.5px}
  input[type=text]:focus{border-color:var(--red)}
  input::placeholder{color:#555}
  input:disabled{opacity:.5}
  .hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    margin:8px 2px 22px;letter-spacing:.5px}
  .suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;max-height:300px;overflow-y:auto;z-index:20;
    display:none}
  .suggest.open{display:block}
  .sg-item{padding:11px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;
    cursor:pointer;border-bottom:1px solid #232323;color:var(--muted2)}
  .sg-item:last-child{border-bottom:none}
  .sg-item:hover,.sg-item.active{background:var(--red);color:#fff}
  .sg-item .q{color:var(--red);font-size:11px;float:right}
  .sg-item:hover .q,.sg-item.active .q{color:#fff}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;
    font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.5px;line-height:2}
  .empty .big{font-size:40px;color:#222;margin-bottom:14px}
  .empty.error .big{color:var(--red)}
  .empty.error{color:var(--muted2)}
  .spin{width:28px;height:28px;border:3px solid #262626;border-top-color:var(--red);
    border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card-head{padding:22px 24px;border-bottom:1px solid var(--line);position:relative}
  .card-head::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
  .art{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;letter-spacing:.5px}
  .meta{margin-top:8px;display:flex;gap:18px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .meta b{color:var(--muted2);font-weight:500}

  .status{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
    padding:5px 11px;border-radius:20px;margin-top:14px}
  .dot2{width:7px;height:7px;border-radius:50%}
  .st-done{background:rgba(46,160,67,.12);color:#3fb950}.st-done .dot2{background:#3fb950}
  .st-work{background:rgba(232,51,58,.12);color:var(--red)}.st-work .dot2{background:var(--red)}
  .st-none{background:rgba(138,138,138,.12);color:var(--muted)}.st-none .dot2{background:var(--muted)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}
  .stat{padding:18px 24px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .v{font-size:28px;font-weight:800;letter-spacing:-1px}
  .stat .v.red{color:var(--red)}
  .stat .l{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}

  .sec{padding:22px 24px;border-bottom:1px solid var(--line)}
  .sec:last-child{border-bottom:none}
  .sec-t{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}

  .orders{display:flex;flex-direction:column;gap:10px}
  .order{display:flex;align-items:center;gap:16px;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:14px 16px;flex-wrap:wrap}
  .order .date{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;min-width:90px}
  .order .note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
    width:100%;order:3;margin-top:-2px}
  .bar{flex:1;height:8px;background:#262626;border-radius:4px;overflow:hidden;min-width:60px}
  .bar i{display:block;height:100%;background:var(--red);border-radius:4px}
  .order .qty{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;min-width:56px;text-align:right}
  .order .qty span{color:var(--muted);font-size:11px;font-weight:400}

  .sizes{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:10px}
  .size{background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    padding:12px 10px;text-align:center}
  .size .sz{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.5px}
  .size .n{font-size:22px;font-weight:800;color:var(--red);margin-top:3px}
  .size .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1px;margin-top:2px}

  .colorpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 14px;border-radius:8px;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted2);cursor:pointer;letter-spacing:.5px}
  .chip.active{background:var(--red);color:#fff;border-color:var(--red)}

  .fact{display:flex;gap:24px;flex-wrap:wrap}
  .fact .f{font-family:'JetBrains Mono',monospace;font-size:13px}
  .fact .f .k{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:4px}
  .fact .f .vv{font-weight:700;font-size:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-l">
      <div class="logo">Cipo <span class="amp">&</span> Baxx</div>
      <div class="sub">Заказы на отшив · Турция 2026</div>
    </div>
    <div class="live" id="liveBadge"><span class="dot"></span><span id="liveText">подключение...</span></div>
  </div>

  <div class="toolbar">
    <div class="hint" id="hint" style="margin:0">// загрузка данных из таблицы...</div>
    <button class="refresh" id="refreshBtn">↻ обновить данные</button>
  </div>

  <div class="searchbox">
    <input type="text" id="q" autocomplete="off" placeholder="Введите артикул, напр. CD369 или WJ233" disabled>
    <div class="suggest" id="sg"></div>
  </div>

  <div id="out">
    <div class="empty">
      <div class="spin"></div>
      Подключаемся к таблице…
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPYUcZ5bop3yDJWTfc6tjNUttIAkxNTSQf5oLDY1GzDenMtcV8tMXHfXceKWD0wLkyug/exec";

let DB = null, ARTS = null, KEYS = [];
const q = document.getElementById('q');
const sg = document.getElementById('sg');
const out = document.getElementById('out');
const hint = document.getElementById('hint');
const liveBadge = document.getElementById('liveBadge');
const liveText = document.getElementById('liveText');
const refreshBtn = document.getElementById('refreshBtn');
let activeIdx = -1, current = [];

function setLive(ok, text){
  liveBadge.classList.toggle('err', !ok);
  liveText.textContent = text;
}

async function loadData(){
  q.disabled = true;
  refreshBtn.disabled = true;
  setLive(true, 'подключение...');
  out.innerHTML = `<div class="empty"><div class="spin"></div>Загружаем актуальные данные из таблицы…</div>`;
  try{
    const res = await fetch(SCRIPT_URL, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    DB = json;
    ARTS = DB.articles;
    KEYS = Object.keys(ARTS);
    const updated = DB.updated ? new Date(DB.updated) : new Date();
    const stamp = updated.toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    setLive(true, 'live · обновлено ' + stamp);
    hint.textContent = '// ' + KEYS.length + ' артикулов в базе · вводите код, цвет можно не писать';
    out.innerHTML = `<div class="empty"><div class="big">⌗</div>Начните вводить артикул выше<br>чтобы увидеть карточку заказа на отшив</div>`;
    q.disabled = false;
    q.focus();
  } catch(err){
    setLive(false, 'ошибка подключения');
    out.innerHTML = `<div class="empty error"><div class="big">⚠</div>
      Не удалось загрузить данные из таблицы.<br>${err.message}<br><br>
      Проверьте, что веб-приложение Apps Script развёрнуто с доступом «Anyone», и нажмите «обновить данные».</div>`;
  } finally {
    refreshBtn.disabled = false;
  }
}

refreshBtn.addEventListener('click', loadData);
loadData();

function baseCode(k){ return k.split('-')[0]; }

function search(term){
  term = term.trim().toUpperCase().replace(/\s+/g,' ');
  if(!term) return [];
  return KEYS.filter(k=>k.toUpperCase().includes(term)).slice(0,40);
}

function totalQty(info){
  let t=0; info.sizes.forEach(s=>s.orders.forEach(o=>t+=o.qty)); return t;
}

// extract leading dd.mm.yy for sorting/display, keep full label (incl. notes) separately
function parseDateLabel(label){
  const m = label.match(/(\d{2})\.(\d{2})\.(\d{2})/);
  let d = m ? new Date(2000+ +m[3], +m[2]-1, +m[1]) : new Date(0);
  let short = m ? m[0] : label;
  let note = m ? label.slice(m[0].length).trim().replace(/^[\(\s]+|[\)\s]+$/g,'') : '';
  return {short, note, d};
}

function orderDates(info){
  const m={};
  info.sizes.forEach(s=>s.orders.forEach(o=>{
    if(!m[o.date]) m[o.date]={qty:0};
    m[o.date].qty+=o.qty;
  }));
  return Object.entries(m).map(([label,v])=>{
    const p = parseDateLabel(label);
    return {label, qty:v.qty, short:p.short, note:p.note, d:p.d};
  }).sort((a,b)=>a.d-b.d);
}

function renderSuggest(list){
  current=list; activeIdx=-1;
  if(!list.length){sg.classList.remove('open');return;}
  sg.innerHTML = list.map((k)=>{
    const tq=totalQty(ARTS[k]);
    return `<div class="sg-item" data-k="${k}">${k}<span class="q">${tq} шт</span></div>`;
  }).join('');
  sg.classList.add('open');
  sg.querySelectorAll('.sg-item').forEach(el=>{
    el.onclick=()=>{select(el.dataset.k);};
  });
}

function select(key){
  q.value = key;
  sg.classList.remove('open');
  renderCard(key);
}

function statusOf(info){
  const f = info.fact;
  const hasOrders = totalQty(info)>0;
  if(f && f.fact) return {cls:'st-done',txt:'Отшито · получено '+f.fact};
  if(hasOrders) return {cls:'st-work',txt:'Заказан · в работе'};
  return {cls:'st-none',txt:'Заказ не оформлен'};
}

function renderCard(key){
  const info = ARTS[key];
  const dates = orderDates(info);
  const tq = totalQty(info);
  const maxq = Math.max(...dates.map(d=>d.qty),1);
  const st = statusOf(info);
  const nOrders = dates.length;

  const sizes = info.sizes.map(s=>{
    let q2=0; s.orders.forEach(o=>q2+=o.qty);
    return {size:s.size, qty:q2||s.total||0};
  }).filter(s=>s.qty>0).sort((a,b)=>b.qty-a.qty);

  const base = baseCode(key);
  const siblings = KEYS.filter(k=>baseCode(k)===base);

  let factHtml='';
  if(info.fact && (info.fact.order||info.fact.fact)){
    factHtml=`<div class="sec"><div class="sec-t">Факт отшива</div><div class="fact">
      ${info.fact.order?`<div class="f"><span class="k">Дата заказа</span><span class="vv">${info.fact.order}</span></div>`:''}
      ${info.fact.fact?`<div class="f"><span class="k">Факт получен</span><span class="vv" style="color:#3fb950">${info.fact.fact}</span></div>`:''}
      ${info.fact.total?`<div class="f"><span class="k">Объём</span><span class="vv">${info.fact.total} шт</span></div>`:''}
    </div></div>`;
  }

  let colorHtml='';
  if(siblings.length>1){
    colorHtml=`<div class="colorpick">`+siblings.map(k=>{
      const col=k.replace(base,'').replace(/^-/,'');
      return `<div class="chip ${k===key?'active':''}" data-k="${k}">${col||k}</div>`;
    }).join('')+`</div>`;
  }

  out.innerHTML = `<div class="card">
    <div class="card-head">
      <div class="art">${key}</div>
      <div class="meta">
        ${info.gender?`<span>Пол: <b>${info.gender}</b></span>`:''}
        <span>Размеров: <b>${info.sizes.length}</b></span>
        <span>Заказов: <b>${nOrders}</b></span>
      </div>
      <div class="status ${st.cls}"><span class="dot2"></span>${st.txt}</div>
      ${colorHtml}
    </div>
    <div class="stats">
      <div class="stat"><div class="v red">${tq}</div><div class="l">Всего заказано, шт</div></div>
      <div class="stat"><div class="v">${nOrders}</div><div class="l">Кол-во заказов</div></div>
      <div class="stat"><div class="v">${dates.length?dates[dates.length-1].short:'—'}</div><div class="l">Последний заказ</div></div>
    </div>
    ${ dates.length ? `<div class="sec"><div class="sec-t">Даты заказов на отшив</div>
      <div class="orders">${dates.map(d=>`
        <div class="order">
          <div class="date">${d.short}</div>
          <div class="bar"><i style="width:${Math.round(d.qty/maxq*100)}%"></i></div>
          <div class="qty">${d.qty}<span> шт</span></div>
          ${d.note?`<div class="note">${d.note}</div>`:''}
        </div>`).join('')}</div></div>` : ''}
    ${ sizes.length ? `<div class="sec"><div class="sec-t">Разбивка по размерам</div>
      <div class="sizes">${sizes.map(s=>`
        <div class="size"><div class="sz">${s.size}</div><div class="n">${s.qty}</div><div class="lbl">шт</div></div>`).join('')}</div></div>`:''}
    ${factHtml}
  </div>`;

  out.querySelectorAll('.chip').forEach(c=>c.onclick=()=>select(c.dataset.k));
}

q.addEventListener('input',()=>{
  if(!ARTS) return;
  const list=search(q.value);
  renderSuggest(list);
  const ex=KEYS.find(k=>k.toUpperCase()===q.value.trim().toUpperCase());
  if(ex) renderCard(ex);
});
q.addEventListener('keydown',e=>{
  if(!sg.classList.contains('open'))return;
  const items=[...sg.querySelectorAll('.sg-item')];
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);}
  else if(e.key==='Enter'){e.preventDefault();
    if(activeIdx>=0&&items[activeIdx])select(items[activeIdx].dataset.k);
    else if(current.length)select(current[0]);return;}
  else return;
  items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
  if(items[activeIdx])items[activeIdx].scrollIntoView({block:'nearest'});
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.searchbox'))sg.classList.remove('open');
});
</script>
</body>
</html>
